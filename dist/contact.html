<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Contactez l’équipe DevisPilot — démo, questions, partenariats." />
  <title>Contact — DevisPilot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap"
    rel="stylesheet" />
  <script type="module" crossorigin src="/assets/contact-CFB86HdF.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/nav-BMV0ZW3O.js">
  <link rel="stylesheet" crossorigin href="/assets/nav-Br167Qwo.css">
</head>

<body class="bg-[#f5f8fb]">
  <div id="site-header"></div>

  <main class="min-h-[70vh] pb-16 pt-8 sm:pb-20 sm:pt-10">
    <div class="mx-auto max-w-xl px-4 sm:px-6">
      <p class="text-[0.8rem] font-semibold uppercase tracking-[0.12em] text-[#4f5875]">Contact</p>
      <h1 class="mt-3 text-[2rem] font-medium leading-tight text-[#121627] sm:text-[2.5rem]">
        Parlons de votre produit
      </h1>
      <p class="mt-4 text-lg leading-relaxed text-[#20222e]">
        Décrivez votre contexte : nous revenons vers vous sous 24H.
      </p>

      <form class="mt-10 space-y-5 rounded-[15px] border border-[#e6ebf3] bg-white p-6 shadow-sm sm:p-8"
        action="https://formsubmit.co/contact@devispilot.fr" method="POST">
        <input type="hidden" name="_subject" value="DevisPilot — message site" />
        <input type="hidden" name="_next" value="/index.html" />
        <input type="text" name="_honey" style="display:none" tabindex="-1" autocomplete="off" />

        <div>
          <label for="name" class="block text-sm font-medium text-[#121627]">Nom</label>
          <input id="name" name="name" type="text" required autocomplete="name"
            class="mt-2 w-full rounded-[8px] border border-[#e6ebf3] bg-white px-4 py-3 text-[#20222e] outline-none ring-blurple/20 transition focus:border-blurple focus:ring-2"
            placeholder="Dupont" />
        </div>
        <div>
          <label for="email" class="block text-sm font-medium text-[#121627]">E-mail</label>
          <input id="email" name="email" type="email" required autocomplete="email"
            class="mt-2 w-full rounded-[8px] border border-[#e6ebf3] bg-white px-4 py-3 text-[#20222e] outline-none ring-blurple/20 transition focus:border-blurple focus:ring-2"
            placeholder="votre@email.com" />
        </div>
        <div>
          <label for="company" class="block text-sm font-medium text-[#121627]">Entreprise (optionnel)</label>
          <input id="company" name="company" type="text" autocomplete="organization"
            class="mt-2 w-full rounded-[8px] border border-[#e6ebf3] bg-white px-4 py-3 text-[#20222e] outline-none ring-blurple/20 transition focus:border-blurple focus:ring-2" />
        </div>
        <div>
          <label for="message" class="block text-sm font-medium text-[#121627]">Message</label>
          <textarea id="message" name="message" required rows="5"
            class="mt-2 w-full resize-y rounded-[8px] border border-[#e6ebf3] bg-white px-4 py-3 text-[#20222e] outline-none ring-blurple/20 transition focus:border-blurple focus:ring-2"
            placeholder="Décrivez-nous votre besoin..."></textarea>
        </div>
        <button type="submit" class="btn-primary w-full sm:w-auto">Envoyer</button>
      </form>

      <p id="thanks"
        class="mt-8 hidden rounded-[15px] border border-[#24e2ac]/40 bg-[#d3f9ee] px-4 py-3 text-sm text-[#09392b]">
        Merci — votre message a bien été envoyé.
      </p>
    </div>
  </main>

  <footer class="border-t border-white/5 bg-[#0b0d16] py-10 text-sm text-[#cdd5e8]">
    <div
      class="mx-auto flex max-w-[83rem] flex-col items-center justify-between gap-6 px-4 sm:flex-row sm:px-6 lg:px-8">
      <div class="flex items-center gap-3">
        <img src="/logo-footer.svg" alt="DevisPilot" class="h-9 w-auto max-w-[200px] object-contain" />
        <span class="text-[#96a3bf]">© <span id="year"></span> DevisPilot</span>
      </div>
      <nav class="flex gap-8" aria-label="Pied de page">
        <a href="/" class="hover:text-white">Accueil</a>
        <a href="/tarifs.html" class="hover:text-white">Tarifs</a>
      </nav>
    </div>
  </footer>

</body>

</html>
